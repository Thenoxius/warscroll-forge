name: Deploy naar GitHub Pages

# Bij elke push naar main: verse Wahapedia-data ophalen, compileren en
# publiceren naar de gh-pages-branch (waar GitHub Pages van serveert).
on:
  push:
    branches: [main]
  schedule:
    - cron: '17 4 * * 1'   # elke maandag 04:17 UTC: verse Wahapedia-data deployen
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Wahapedia-data bijwerken
        # Mislukt dit (bv. Wahapedia onbereikbaar), dan deployen we de gecommitte data.
        run: node scripts/update-data.mjs || echo "::warning::Data-update mislukt — deploy gebruikt de gecommitte data."
      - name: Publiceren naar gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B gh-pages
          git add -A
          git commit -m "Deploy van $GITHUB_SHA met data-update $(date -u +%F)" || echo "Geen wijzigingen te committen"
          git push --force origin gh-pages
      - name: Pages-build aanvragen
        # Pushes met GITHUB_TOKEN triggeren de interne Pages-build niet; expliciet aanvragen dus.
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages/builds"
