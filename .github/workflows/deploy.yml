name: Deploy naar GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '17 4 * * 1'   # elke maandag 04:17 UTC: verse BSData-catalogi
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Dependencies installeren
        run: npm ci
      - name: BSData-data bijwerken
        run: node scripts/update-data.mjs || echo "::warning::Data-update mislukt — deploy gebruikt de gecommitte data."
      - name: Spearhead-data bijwerken (Wahapedia)
        run: node scripts/update-spearheads.mjs || echo "::warning::Spearhead-update mislukt — deploy gebruikt de gecommitte data."
      - name: Cache-busting versie invullen
        run: sed -i "s/__BUILD__/${GITHUB_RUN_ID}/g" index.html
      - name: Rauwe data en deps uit de deploy weren
        run: rm -rf data/bsdata node_modules
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
